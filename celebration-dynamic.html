<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">💖 Celebration 💖</title>
    
    <!-- Load celebration data -->
    <script src="celebration-data.js"></script>
    
    <script>
        // Load user data BEFORE page renders
        document.addEventListener('DOMContentLoaded', function() {
            // Get user name from localStorage
            const userName = localStorage.getItem('userName') || 'default';
            
            // Get data for this user
            const data = getCelebrationData(userName);
            
            // Update page title
            document.getElementById('pageTitle').textContent = data.title;
            
            // Update main name display
            document.getElementById('nameDisplay').textContent = data.name + '!';
            
            // Update subtitle
            document.getElementById('subtitle').textContent = data.subtitle;
            
            // Update love card content
            document.getElementById('loveGreeting').innerHTML = '💌 ' + data.message.greeting + ' 💌';
            document.getElementById('lovePara1').innerHTML = data.message.paragraph1;
            document.getElementById('lovePara2').innerHTML = data.message.paragraph2;
            document.getElementById('lovePara3').innerHTML = data.message.paragraph3;
            
            // Update hug message
            document.getElementById('hugMessage').textContent = data.hug;
            
            // Update image
            const hugImage = document.getElementById('hugImage');
            hugImage.src = data.image;
            hugImage.onerror = function() {
                // Fallback nếu ảnh không tìm thấy
                this.src = 'bear-hug2.webp';
            };
            
            // Update music (if provided)
            if (data.music) {
                document.getElementById('bgMusic').innerHTML = 
                    `<source src="${data.music}" type="audio/mpeg">
                     <source src="Cupid.mp3" type="audio/mpeg">`;
            }
            
            console.log('✅ Loaded data for:', userName);
            console.log('📦 Data:', data);
        });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Confetti Canvas */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        /* Main Content */
        .celebration-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* Floating Background */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .floating-item {
            position: absolute;
            font-size: 30px;
            animation: float 15s infinite ease-in-out;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-30px) translateX(20px); }
            50% { transform: translateY(0) translateX(-20px); }
            75% { transform: translateY(30px) translateX(20px); }
        }

        /* Decorations */
        .decoration {
            position: fixed;
            font-size: 50px;
            animation: rotate-bounce 4s infinite ease-in-out;
            z-index: 5;
        }

        .deco-1 { top: 10%; left: 10%; animation-delay: 0s; }
        .deco-2 { top: 20%; right: 15%; animation-delay: 0.5s; }
        .deco-3 { bottom: 20%; left: 12%; animation-delay: 1s; }
        .deco-4 { bottom: 15%; right: 10%; animation-delay: 1.5s; }
        .deco-5 { top: 60%; left: 5%; animation-delay: 2s; }
        .deco-6 { top: 50%; right: 8%; animation-delay: 2.5s; }

        @keyframes rotate-bounce {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(10deg) scale(1.1); }
            50% { transform: rotate(-10deg) scale(0.9); }
            75% { transform: rotate(10deg) scale(1.1); }
        }

        /* Main Message */
        .main-message {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        .yay-text {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        .name-celebrate {
            display: block;
            font-size: 3.5rem;
            color: #ff69b4;
            text-shadow: 0 0 30px rgba(255, 105, 180, 1);
            margin-top: 10px;
        }

        .sub-message {
            font-size: 1.5rem;
            color: #ffb6c1;
            margin-top: 20px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Love Card */
        .love-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 30px;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.4);
            position: relative;
            animation: fadeInUp 1.2s ease;
            margin-bottom: 40px;
        }

        .love-card::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #ff69b4, #ff1493, #ff69b4);
            border-radius: 30px;
            z-index: -1;
            animation: gradient-rotate 3s linear infinite;
        }

        @keyframes gradient-rotate {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(30deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .corner-deco {
            position: absolute;
            font-size: 30px;
            animation: wiggle 2s infinite ease-in-out;
        }

        .corner-tl { top: 10px; left: 10px; }
        .corner-tr { top: 10px; right: 10px; animation-delay: 0.5s; }
        .corner-bl { bottom: 10px; left: 10px; animation-delay: 1s; }
        .corner-br { bottom: 10px; right: 10px; animation-delay: 1.5s; }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .love-title {
            font-size: 1.8rem;
            color: #ff1493;
            text-align: center;
            margin-bottom: 30px;
        }

        .love-text {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.8;
            text-align: justify;
        }

        .love-text p {
            margin-bottom: 20px;
        }

        .highlight {
            color: #ff1493;
            font-weight: bold;
            background: linear-gradient(120deg, #ffe4f0 0%, #ffb6d9 100%);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Mega Heart */
        .mega-heart {
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.3s;
            margin: 30px 0;
            animation: heartbeat 1.5s infinite;
        }

        .mega-heart:hover {
            transform: scale(1.2);
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.05); }
        }

        /* Hug Section */
        .hug-container {
            position: relative;
            margin: 40px 0;
        }

        .hug-gif {
            width: clamp(200px, 60vw, 300px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.5);
            animation: float 3s infinite ease-in-out;
        }

        .hug-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 105, 180, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.6);
            z-index: 100;
            animation: slideUp 1s ease;
            max-width: 90%;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .yay-text { font-size: 2.2rem; }
            .name-celebrate { font-size: 2.6rem; }
            .sub-message { font-size: 1.2rem; }
            .love-card { padding: 30px 20px; }
            .love-title { font-size: 1.3rem; }
            .love-text { font-size: 1rem; }
            .mega-heart { font-size: 70px; }
            .decoration { font-size: 35px; }
            .hug-message { 
                font-size: 1.1rem; 
                padding: 15px 25px;
            }
        }
    </style>
</head>
<body>
    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Floating Background -->
    <div class="floating-bg" id="floatingBg"></div>

    <!-- Decorative Elements -->
    <div class="decoration deco-1">🧸</div>
    <div class="decoration deco-2">🌸</div>
    <div class="decoration deco-3">💐</div>
    <div class="decoration deco-4">🧸</div>
    <div class="decoration deco-5">🌺</div>
    <div class="decoration deco-6">🌷</div>

    <!-- Main Content -->
    <div class="celebration-container">
        <div class="mega-heart">💖</div>
        
        <div class="main-message">
            <h1 class="yay-text">
                YAY! 🎉
                <span class="name-celebrate" id="nameDisplay">Loading...</span>
            </h1>
            <p class="sub-message" id="subtitle">Loading...</p>
        </div>

        <div class="love-card">
            <span class="corner-deco corner-tl">🦋</span>
            <span class="corner-deco corner-tr">🦋</span>
            <span class="corner-deco corner-bl">✨</span>
            <span class="corner-deco corner-br">✨</span>
            
            <h2 class="love-title" id="loveGreeting">💌 Loading... 💌</h2>
            
            <div class="love-text">
                <p id="lovePara1">Loading...</p>
                <p id="lovePara2">Loading...</p>
                <p id="lovePara3">Loading...</p>
            </div>
        </div>

        <div class="hug-container">
            <img src="bear-hug2.webp" alt="Virtual Hug" class="hug-gif" id="hugImage">
        </div>
    </div>

    <div class="hug-message" id="hugMessage">Loading...</div>

    <!-- Background Music -->
    <audio id="bgMusic" loop preload="metadata">
        <source src="Cupid.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Confetti Animation
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const confetti = [];
        const confettiCount = 150;

        for (let i = 0; i < confettiCount; i++) {
            confetti.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 5,
                speed: Math.random() * 3 + 1,
                color: ['#ff69b4', '#ffb6c1', '#ff1493', '#ffc0cb', '#fff'][Math.floor(Math.random() * 5)],
                angle: Math.random() * Math.PI * 2,
                drift: Math.random() * 2 - 1
            });
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confetti.forEach((c) => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.angle);
                ctx.fillStyle = c.color;
                ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);
                ctx.restore();

                c.y += c.speed;
                c.x += c.drift;
                c.angle += 0.01;

                if (c.y > canvas.height) {
                    c.y = -20;
                    c.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(drawConfetti);
        }

        drawConfetti();

        // Floating items
        function createFloatingItems() {
            const container = document.getElementById('floatingBg');
            const emojis = ['💕', '💖', '💗', '💓', '💝', '🌹', '🌸', '🦋', '✨'];
            
            for (let i = 0; i < 30; i++) {
                const item = document.createElement('div');
                item.className = 'floating-item';
                item.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                item.style.left = Math.random() * 100 + '%';
                item.style.top = Math.random() * 100 + '%';
                item.style.animationDelay = Math.random() * 5 + 's';
                item.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(item);
            }
        }

        createFloatingItems();

        // Auto-play music (may require user interaction)
        window.addEventListener('click', () => {
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log('Music autoplay prevented'));
        });

        // Resize canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
